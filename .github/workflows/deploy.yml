name: Deploy React App to GitHub Pages

on:
push:
branches: ["main"]
workflow_dispatch:
schedule:
- cron: '30 6 * * *' # UTC 6:30 = 台灣時間下午 14:30 自動執行

permissions:
contents: read
pages: write
id-token: write

concurrency:
group: "pages"
cancel-in-progress: true

jobs:
build:
runs-on: ubuntu-latest
steps:
  - name: Checkout
    uses: actions/checkout@v3

  # --- 步驟 1：設定 Python 抓取最新數據 ---
  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Python Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install requests yfinance gspread google-auth

  - name: Run Skynet Python Core (產生真實股價 json)
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
    run: python tg_bot_optimized.py

  # --- 步驟 2：設定 Node.js 準備打包網頁 ---
  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  - name: Install Node Dependencies
    run: npm install

  # --- 步驟 3：將 Python 產生的資料連同 React 一起打包 ---
  - name: Build React App
    run: npm run build

  - name: Upload artifact
    uses: actions/upload-pages-artifact@v3
    with:
      path: ./build


deploy:
environment:
name: github-pages
url: ${{ steps.deployment.outputs.page_url }}
runs-on: ubuntu-latest
needs: build
steps:
- name: Deploy to GitHub Pages
id: deployment
uses: actions/deploy-pages@v4
